<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" contenrst="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
    <title>Project: Rock, Paper, Scissors</title>
</head>
<body>
    <div class="container">
       <div class="card">


        <div class="row">

          

   
  <div class="col-4">
               <h1>You</h1>
             
            </div>
            <div class="col-4">
                <div class="card1">
  <div data-status="inprogress" class="teams">
    
    <span class="event-scoreboard">
      <span class="event-score-container">
        <span class="current-time-container">
          <span class="event-current-time">
          </span>
          <span class="progress-dots" data-progress="1S">
            <span class="load"></span>
          </span>
        </span>
        <span class="score-container">
          <span class="score-home">0</span>
          <span class="custom-sep">-</span>
          <span class="score-away">0</span>
        </span>
      </span>
    </span>

  </div>
</div>
            </div>
            <div class="col-4">
              <h1>Computer</h1>
              
            </div>   
  


        </div>
        </div>
      
                    
        <div class="row">
            <div class="col-2">
                <div class="comic-brutal-button-container">
  <button class="comic-brutal-button">
    <div class="button-inner">
      <span class="button-text">Start Over?</span>
      <div class="halftone-overlay"></div>
      <div class="ink-splatter"></div>
    </div>
    <div class="button-shadow"></div>
    <div class="button-frame"></div>
  </button>
</div>
            </div>
            <div class="col-1"></div>
            <div class="col-3">
                <div class="comic-brutal-button-container">
  <button class="comic-brutal-button">
    <div class="button-inner">
      <span class="button-text">ROCK!</span>
      <div class="halftone-overlay"></div>
      <div class="ink-splatter"></div>
    </div>
    <div class="button-shadow"></div>
    <div class="button-frame"></div>
  </button>
</div>

            </div>
            <div class="col-3">
                <div class="comic-brutal-button-container">
  <button class="comic-brutal-button">
    <div class="button-inner">
      <span class="button-text">PAPER!</span>
      <div class="halftone-overlay"></div>
      <div class="ink-splatter"></div>
    </div>
    <div class="button-shadow"></div>
    <div class="button-frame"></div>
  </button>
</div>

            </div>
            <div class="col-3">
                <div class="comic-brutal-button-container">
  <button class="comic-brutal-button">
    <div class="button-inner">
      <span class="button-text">SCISSORS!</span>
      <div class="halftone-overlay"></div>
      <div class="ink-splatter"></div>
    </div>
    <div class="button-shadow"></div>
    <div class="button-frame"></div>
  </button>
</div>

            </div>
        </div>
        </div>
    </div>
    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script href="js/script.js"></script>
</body>
</html>
